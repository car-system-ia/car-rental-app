{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <div class="card shadow">
            <div class="card-body">

                <h4 class="text-center mb-4">🔐 تسجيل الدخول</h4>

                <form method="post">

                    <div class="mb-3">
                        <input class="form-control" name="username" placeholder="اسم المستخدم">
                    </div>

                    <div class="mb-3">
                        <input class="form-control" name="password" type="password" placeholder="كلمة السر">
                    </div>

                   <button type="submit" class="btn btn-primary w-100">
    دخول
</button> 

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
