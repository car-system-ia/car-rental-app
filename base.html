<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Car Rental{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 CUSTOM CSS -->
    <style>
        .card {
            border: none;
            border-radius: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
    </style>

</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="/dashboard">🚗 Car Rental</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.path == '/cars' %}active{% endif %}" href="/cars">Cars</a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.path == '/clients' %}active{% endif %}" href="/clients">Clients</a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.path == '/rentals' %}active{% endif %}" href="/rentals">Rentals</a>
        </li>

      </ul>

      <a href="/logout" class="btn btn-danger">Logout</a>

    </div>
  </div>
</nav>

<!-- 🔥 CONTENT -->
<div class="container mt-4">

    <!-- ✅ FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}

                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- محتوى الصفحات -->
    {% block content %}{% endblock %}

</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
